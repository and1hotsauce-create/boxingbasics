<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boxing Basics — Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#FFF8F0',
            warmchar: '#2D2420',
            amber: '#D4910A',
            amberlight: '#F5DEB3',
            warmgray: '#6B5E57',
            softbg: '#FDF5EC',
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            serif: ['DM Serif Display', 'serif'],
          },
        },
      },
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body class="bg-cream text-warmchar min-h-screen">

  <!-- Nav -->
  <nav class="fixed top-0 w-full bg-cream/90 backdrop-blur-sm z-50 border-b border-amberlight">
    <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="font-serif text-2xl text-warmchar">Boxing Basics</a>
      <div class="flex items-center gap-6">
        <a href="index.html" class="hidden sm:inline text-sm font-medium text-warmgray hover:text-amber transition">Home</a>
        <button id="loginBtn" onclick="showLoginModal()" class="text-sm font-semibold text-amber hover:text-amber/80 transition">Admin Login</button>
        <button id="logoutBtn" onclick="logout()" class="hidden text-sm font-semibold text-red-500 hover:text-red-400 transition">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Calendar -->
  <section class="pt-28 pb-20 px-4 sm:px-6">
    <div class="max-w-5xl mx-auto">
      <h1 class="font-serif text-3xl sm:text-4xl mb-2">Schedule</h1>
      <p class="text-warmgray mb-6">See available time slots. Get in touch to book your session.</p>

      <!-- Admin notice -->
      <div id="adminNotice" class="hidden bg-amber/10 border border-amber rounded-xl p-4 mb-6">
        <p class="text-sm font-medium text-amber">Admin mode — click any slot to toggle between Available, Booked, or Blocked.</p>
      </div>

      <!-- Week navigation -->
      <div class="flex items-center justify-between mb-6">
        <button onclick="changeWeek(-1)" class="bg-softbg hover:bg-amberlight transition px-4 py-2 rounded-xl text-sm font-medium text-warmchar">Previous Week</button>
        <h2 id="weekLabel" class="font-semibold text-lg text-warmchar"></h2>
        <button onclick="changeWeek(1)" class="bg-softbg hover:bg-amberlight transition px-4 py-2 rounded-xl text-sm font-medium text-warmchar">Next Week</button>
      </div>

      <!-- Legend -->
      <div class="flex gap-6 mb-4 text-sm text-warmgray">
        <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-emerald-100 border border-emerald-300 inline-block"></span> Available</div>
        <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-red-100 border border-red-300 inline-block"></span> Booked</div>
        <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-gray-100 border border-gray-300 inline-block"></span> Blocked</div>
      </div>

      <!-- Calendar grid -->
      <div class="overflow-x-auto rounded-2xl border border-amberlight">
        <table class="w-full min-w-[700px]">
          <thead>
            <tr id="dayHeaders" class="bg-softbg">
              <th class="p-3 text-left text-sm font-semibold text-warmgray w-20">Time</th>
            </tr>
          </thead>
          <tbody id="calendarBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- Login Modal -->
  <div id="loginModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
    <div class="bg-cream rounded-2xl p-8 w-full max-w-sm mx-4 shadow-xl">
      <h3 class="font-serif text-2xl mb-6">Admin Login</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-warmgray mb-1">Email</label>
          <input type="email" id="loginEmail" class="w-full px-4 py-3 rounded-xl border border-amberlight bg-white text-warmchar focus:outline-none focus:border-amber" placeholder="Email address">
        </div>
        <div>
          <label class="block text-sm font-medium text-warmgray mb-1">Password</label>
          <input type="password" id="loginPassword" class="w-full px-4 py-3 rounded-xl border border-amberlight bg-white text-warmchar focus:outline-none focus:border-amber" placeholder="Password"
            onkeydown="if(event.key==='Enter') attemptLogin()">
        </div>
        <p id="loginError" class="text-red-500 text-sm hidden">Incorrect email or password.</p>
        <div class="flex gap-3 pt-2">
          <button onclick="attemptLogin()" class="flex-1 bg-amber text-white font-semibold px-6 py-3 rounded-xl hover:bg-amber/90 transition">Login</button>
          <button onclick="hideLoginModal()" class="flex-1 bg-softbg text-warmgray font-semibold px-6 py-3 rounded-xl hover:bg-amberlight transition">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Slot Edit Modal (Admin) -->
  <div id="slotModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
    <div class="bg-cream rounded-2xl p-8 w-full max-w-sm mx-4 shadow-xl">
      <h3 class="font-serif text-2xl mb-2">Edit Slot</h3>
      <p id="slotModalLabel" class="text-warmgray mb-6"></p>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-warmgray mb-1">Status</label>
          <select id="slotStatusSelect" class="w-full px-4 py-3 rounded-xl border border-amberlight bg-white text-warmchar focus:outline-none focus:border-amber">
            <option value="available">Available</option>
            <option value="booked">Booked</option>
            <option value="blocked">Blocked</option>
          </select>
        </div>
        <div id="clientFields">
          <div class="mb-3">
            <label class="block text-sm font-medium text-warmgray mb-1">Client Name</label>
            <input type="text" id="slotClientName" class="w-full px-4 py-3 rounded-xl border border-amberlight bg-white text-warmchar focus:outline-none focus:border-amber" placeholder="e.g. John">
          </div>
          <div>
            <label class="block text-sm font-medium text-warmgray mb-1">Notes</label>
            <textarea id="slotNotes" rows="3" class="w-full px-4 py-3 rounded-xl border border-amberlight bg-white text-warmchar focus:outline-none focus:border-amber" placeholder="e.g. First session, needs gloves"></textarea>
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="saveSlot()" class="flex-1 bg-amber text-white font-semibold px-6 py-3 rounded-xl hover:bg-amber/90 transition">Save</button>
          <button onclick="hideSlotModal()" class="flex-1 bg-softbg text-warmgray font-semibold px-6 py-3 rounded-xl hover:bg-amberlight transition">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- Auth ---
    const ADMIN_EMAIL = 'pantera.cuba.boxing@gmail.com';
    const ADMIN_PASS = '12Disciples!!';
    let isAdmin = false;

    function showLoginModal() {
      document.getElementById('loginModal').classList.remove('hidden');
      document.getElementById('loginEmail').focus();
      document.getElementById('loginError').classList.add('hidden');
    }

    function hideLoginModal() {
      document.getElementById('loginModal').classList.add('hidden');
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
    }

    function attemptLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
        isAdmin = true;
        sessionStorage.setItem('bbAdmin', 'true');
        hideLoginModal();
        updateAdminUI();
        renderCalendar();
      } else {
        document.getElementById('loginError').classList.remove('hidden');
      }
    }

    function logout() {
      isAdmin = false;
      sessionStorage.removeItem('bbAdmin');
      updateAdminUI();
      renderCalendar();
    }

    function updateAdminUI() {
      document.getElementById('loginBtn').classList.toggle('hidden', isAdmin);
      document.getElementById('logoutBtn').classList.toggle('hidden', !isAdmin);
      document.getElementById('adminNotice').classList.toggle('hidden', !isAdmin);
    }

    // Restore session
    if (sessionStorage.getItem('bbAdmin') === 'true') {
      isAdmin = true;
      updateAdminUI();
    }

    // --- Calendar Data ---
    const TIME_SLOTS = [];
    for (let h = 6; h <= 20; h++) {
      TIME_SLOTS.push(`${h.toString().padStart(2, '0')}:00`);
      if (h < 20) TIME_SLOTS.push(`${h.toString().padStart(2, '0')}:30`);
    }

    const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

    let currentWeekStart = getMonday(new Date());

    function getMonday(d) {
      const date = new Date(d);
      const day = date.getDay();
      const diff = date.getDate() - day + (day === 0 ? -6 : 1);
      date.setDate(diff);
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function formatDate(date) {
      return date.toISOString().split('T')[0];
    }

    function getSlotKey(date, time) {
      return `${formatDate(date)}_${time}`;
    }

    function getCalendarData() {
      const data = localStorage.getItem('bbCalendar');
      return data ? JSON.parse(data) : {};
    }

    function saveCalendarData(data) {
      localStorage.setItem('bbCalendar', JSON.stringify(data));
    }

    function getSlotData(date, time) {
      const data = getCalendarData();
      const entry = data[getSlotKey(date, time)];
      if (!entry) return { status: 'available', clientName: '', notes: '' };
      // Handle legacy string format
      if (typeof entry === 'string') return { status: entry, clientName: '', notes: '' };
      return entry;
    }

    // --- Slot editing ---
    let editingSlotKey = null;

    const statusSelect = () => document.getElementById('slotStatusSelect');
    const clientFields = () => document.getElementById('clientFields');

    function toggleClientFields() {
      const show = statusSelect().value === 'booked';
      clientFields().style.display = show ? 'block' : 'none';
    }

    function showSlotModal(dateStr, time, dayLabel) {
      if (!isAdmin) return;
      editingSlotKey = `${dateStr}_${time}`;
      document.getElementById('slotModalLabel').textContent = `${dayLabel} — ${time}`;

      // Load existing data
      const data = getCalendarData();
      const entry = data[editingSlotKey];
      const slot = entry
        ? (typeof entry === 'string' ? { status: entry, clientName: '', notes: '' } : entry)
        : { status: 'available', clientName: '', notes: '' };

      statusSelect().value = slot.status;
      document.getElementById('slotClientName').value = slot.clientName || '';
      document.getElementById('slotNotes').value = slot.notes || '';
      toggleClientFields();

      document.getElementById('slotModal').classList.remove('hidden');
    }

    function hideSlotModal() {
      document.getElementById('slotModal').classList.add('hidden');
      editingSlotKey = null;
    }

    function saveSlot() {
      if (!editingSlotKey) return;
      const data = getCalendarData();
      const status = statusSelect().value;

      if (status === 'available') {
        delete data[editingSlotKey];
      } else {
        data[editingSlotKey] = {
          status: status,
          clientName: document.getElementById('slotClientName').value.trim(),
          notes: document.getElementById('slotNotes').value.trim(),
        };
      }
      saveCalendarData(data);
      hideSlotModal();
      renderCalendar();
    }

    // --- Rendering ---
    function changeWeek(offset) {
      currentWeekStart.setDate(currentWeekStart.getDate() + (offset * 7));
      renderCalendar();
    }

    function renderCalendar() {
      const headerRow = document.getElementById('dayHeaders');
      headerRow.innerHTML = '<th class="p-3 text-left text-sm font-semibold text-warmgray w-20 border-b border-amberlight">Time</th>';

      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(currentWeekStart);
        d.setDate(d.getDate() + i);
        dates.push(d);

        const th = document.createElement('th');
        const dayNum = d.getDate();
        const month = d.toLocaleString('en-AU', { month: 'short' });
        th.className = 'p-3 text-center text-sm font-semibold text-warmchar border-b border-amberlight';
        th.innerHTML = `${DAYS[i]}<br><span class="text-warmgray font-normal">${dayNum} ${month}</span>`;
        headerRow.appendChild(th);
      }

      // Week label
      const startMonth = dates[0].toLocaleString('en-AU', { month: 'long' });
      const endMonth = dates[6].toLocaleString('en-AU', { month: 'long' });
      const year = dates[0].getFullYear();
      const label = startMonth === endMonth
        ? `${dates[0].getDate()} – ${dates[6].getDate()} ${startMonth} ${year}`
        : `${dates[0].getDate()} ${startMonth} – ${dates[6].getDate()} ${endMonth} ${year}`;
      document.getElementById('weekLabel').textContent = label;

      // Rows
      const body = document.getElementById('calendarBody');
      body.innerHTML = '';

      for (const time of TIME_SLOTS) {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-amberlight/50';

        const timeTd = document.createElement('td');
        timeTd.className = 'p-2 text-sm text-warmgray font-medium whitespace-nowrap';
        timeTd.textContent = time;
        tr.appendChild(timeTd);

        for (let i = 0; i < 7; i++) {
          const td = document.createElement('td');
          td.className = 'p-1 text-center';

          const slot = getSlotData(dates[i], time);
          const dateStr = formatDate(dates[i]);
          const dayLabel = `${DAYS[i]} ${dates[i].getDate()} ${dates[i].toLocaleString('en-AU', { month: 'short' })}`;

          let cellClass = 'rounded-lg py-2 px-1 text-xs font-medium transition ';

          if (slot.status === 'available') {
            cellClass += 'bg-emerald-50 text-emerald-600 border border-emerald-200';
          } else if (slot.status === 'booked') {
            cellClass += 'bg-red-50 text-red-500 border border-red-200';
          } else if (slot.status === 'blocked') {
            cellClass += 'bg-gray-100 text-gray-400 border border-gray-200';
          }

          if (isAdmin) {
            cellClass += ' cursor-pointer hover:opacity-75';
          }

          const div = document.createElement('div');
          div.className = cellClass;

          if (slot.status === 'available') {
            div.textContent = 'Open';
          } else if (slot.status === 'blocked') {
            div.textContent = '—';
          } else if (slot.status === 'booked') {
            if (isAdmin && slot.clientName) {
              div.innerHTML = `<span class="block font-semibold">${slot.clientName}</span>`;
              if (slot.notes) {
                div.innerHTML += `<span class="block text-[10px] opacity-75 truncate">${slot.notes}</span>`;
              }
            } else {
              div.textContent = 'Booked';
            }
          }

          if (isAdmin) {
            div.onclick = () => showSlotModal(dateStr, time, dayLabel);
          }

          td.appendChild(div);
          tr.appendChild(td);
        }

        body.appendChild(tr);
      }
    }

    document.getElementById('slotStatusSelect').addEventListener('change', toggleClientFields);

    renderCalendar();
  </script>

</body>
</html>
